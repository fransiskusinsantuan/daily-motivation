


<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motivasi Harian</title>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
text-align:center;
color:white;
background-size:cover;
background-position:center;
transition:1s;
}

.overlay{
background:rgba(0,0,0,0.5);
min-height:100vh;
padding-top:40px;
}

.container{
background:rgba(0,0,0,0.6);
width:85%;
max-width:800px;
margin:auto;
padding:40px;
border-radius:15px;
}

#motivasi{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

#nasehat{
display:none;
font-size:18px;
margin-top:20px;
line-height:1.6;
}

button{
margin:10px;
padding:14px 25px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.btn1{background:#4facfe;color:white;}
.btn2{background:#25D366;color:white;}
.btn3{background:#ffaa00;color:white;}
.btn4{background:#333;color:white;}

footer{
margin-top:40px;
}

#motivasi{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

.fade{
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.fade{
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}


</style>

</head>

<body>

<div class="overlay">

<h1>Motivasi Harian</h1>

<p id="tanggal"></p>

<div class="container">

<p id="motivasi"></p>

<button class="btn1" onclick="motivasiBaru()">Motivasi Baru</button>

<button class="btn3" onclick="lihatNasehat()">Lihat Nasehat</button>

<button class="btn2" onclick="shareWA()">Share ke WhatsApp</button>

<p id="nasehat"></p>

</div>

<footer>

<p>Bermenung Bersama Fransiskus Insantuan_13
    Update Setiap Hari
</p>


</footer>

</div>

<audio autoplay loop muted id="music">
<source src="musikko.mp3" type="audio/mpeg">
</audio>

<script>

document.addEventListener("click", function() {
document.getElementById("music").muted = false;
document.getElementById("music").play();
});
    

const daftarMotivasi=[

{
motivasi:`Cinta Yang Tulus, Tidak Memaksa Untuk Memiliki
Tetapi Berusaha Untuk Memberikan Yang Terbaik
Bagi Orang Yang Dicintai. `,
nasehat:`Sering kali orang mengira bahwa cinta
berarti harus memiliki seseorang sepenuhnya.
Padahal cinta yang dewasa adalah cinta yang mampu
memberi ruang dan kepercayaan.
Ketika kita mencintai seseorang dengan tulus,
kita tidak akan mengekangnya atau memaksanya
menjadi seperti yang kita inginkan. 
Kita justru akan mendukungnya untuk berkembang
menjadi pribadi yang lebih baik.
Cinta yang sehat adalah cinta yang saling mendukung mimpi,
saling menguatkan saat lemah, 
dan saling mengingatkan ketika salah.
Oleh karena itu, jangan jadikan cinta 
sebagai alasan untuk menguasai seseorang,
tetapi jadikan cinta sebagai alasan
untuk saling bertumbuh bersama. 💕`,
gambar:"gambarteg.jpg"
},

{
motivasi:`Menghargai Orang Lain Adalah Tanda
Kedewasaan hati dan Kebesaran Jiwa.🤝
Tapi Siapa Yang Tetap Berjalan Walaupun Pelan.`,
nasehat:`Dalam kehidupan ini kita tidak hidup sendirian. 
Kita selalu bertemu dengan berbagai macam orang 
yang memiliki latar belakang, pemikiran, dan cara hidup yang berbeda.
Karena itu, belajar menghargai orang lain adalah sikap yang sangat penting.
Menghargai tidak berarti kita selalu setuju dengan mereka,
tetapi kita mampu menerima bahwa setiap orang berhak memiliki pendapat 
dan jalan hidupnya sendiri. Biasakanlah berbicara dengan sopan, 
mendengarkan ketika orang lain menyampaikan pendapatnya,
dan tidak merendahkan usaha atau perjuangan siapa pun. Ingatlah bahwa
kata-kata yang baik dapat membangun hati seseorang,sedangkan
kata-kata yang kasar dapat melukai perasaan mereka. 
Jika kita ingin dihargai oleh orang lain, maka mulailah 
terlebih dahulu dengan menghargai mereka.
LAKUKAN APA YANG KAMU INGIN DILAKUKAN BAGIMU,
MAKA ORANG LAIN AKAN MELAKUKAN HAL ITU BAGIMU. 😊

  `,
gambar:"gambarytg.jpeg"
},

];

let indexSekarang=0;

function motivasiBaru(){

let random=Math.floor(Math.random()*daftarMotivasi.length);

indexSekarang=random;

document.getElementById("motivasi").innerText=daftarMotivasi[random].motivasi;

document.getElementById("nasehat").style.display="none";

document.body.style.backgroundImage="url("+daftarMotivasi[random].gambar+")";

}

function lihatNasehat(){

document.getElementById("nasehat").style.display="block";

document.getElementById("nasehat").innerText=daftarMotivasi[indexSekarang].nasehat;

}

function shareWA(){

let teks=document.getElementById("motivasi").innerText;

let url="https://wa.me/?text="+encodeURIComponent(teks);

window.open(url);

}

const hariIni=new Date();

document.getElementById("tanggal").innerText=hariIni.toDateString();

motivasiBaru();

</script>

</body>
</html>
