


<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motivasi Harian</title>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
text-align:center;
color:white;
background-size:cover;
background-position:center;
transition:1s;
}

.overlay{
background:rgba(0,0,0,0.5);
min-height:100vh;
padding-top:40px;
}

.container{
background:rgba(0,0,0,0.6);
width:85%;
max-width:800px;
margin:auto;
padding:40px;
border-radius:15px;
}

#motivasi{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

#nasehat{
display:none;
font-size:18px;
margin-top:20px;
line-height:1.6;
}

button{
margin:10px;
padding:14px 25px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.btn1{background:#4facfe;color:white;}
.btn2{background:#25D366;color:white;}
.btn3{background:#ffaa00;color:white;}
.btn4{background:#333;color:white;}

footer{
margin-top:40px;
}

#motivasi{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

.fade{
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.fade{
animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}


</style>

</head>

<body>

<div class="overlay">

<h1>Motivasi Harian</h1>

<p id="tanggal"></p>

<div class="container">

<p id="motivasi"></p>

<button class="btn1" onclick="motivasiBaru()">Motivasi Baru</button>

<button class="btn3" onclick="lihatNasehat()">Lihat Nasehat</button>

<button class="btn2" onclick="shareWA()">Share ke WhatsApp</button>

<p id="nasehat"></p>

</div>

<footer>

<p>Bermenung Bersama Fransiskus Insantuan_13</p>

</footer>

</div>

<audio autoplay loop muted id="music">
<source src="musik.mp3" type="audio/mpeg">
</audio>

<script>

document.addEventListener("click", function() {
document.getElementById("music").muted = false;
document.getElementById("music").play();
});
    

const daftarMotivasi=[

{
motivasi:"Belajarlah Untuk Berani Berkorban.",
nasehat:`Terkadang berkorban itu sakit, apa lagi mengorbankan sesuatu yang melekat erat dengan diri kita.
Seperti filosofi pohon beringin yang menjulang tinggi, akarnya rela merenggam tanah dalam kegelapan,menyembunyikan diri di bawah permukaan
agar batangnya bisa menyambut sinar matahari dan memberikan teduh bagi banyak orang.
"Tak ada mahkota yang terpasang,
tanpa adanya darah yang mengalir dan luka yang tergores di pundak".
"Tak ada lautan yang penuh dengan keajaiban,
tanpa adanya sungai yang rela mengalir jauh dari sumbernya".
Banyak dari kita yang berpikir bahwa BERKORBAN berarti menyiksa diri hanya demi kebahagiaan orang lain. Namun pada dasarnya tidaklah seperti itu!
Seperti pohon yang harus melepaskan daunnya di musim gugur 
agar bisa kembali tumbuh di musim semi.
Maka mungkin kita juga harus belajar!
untuk merelakan sebagian dari diri kita, agar membuka kemungkinan bagi hal-hal yang jauh lebih berharga dalam hidup kita.
Pada akhirnya kamu, saya dan kita semua perlu bertanya dan bermenung bahwa 
"JIKA KEHIDUPAN ADALAH PERJALANAN YANG PENUH DENGAN PILIHAN, 
MAKA APAKAH KITA INGIN MEMILIH JALAN YANG HANYA MENGUNTUNGKAN DIRI KITA SENDIRI,
ATAUKAH JALAN YANG MEMBUAT KITA TURUT AMBIL BAGIAN DALAM KEBAIKAN BAGI ORANG LAIN". 🥲`,
gambar:"gambartiga.jpg"
},

{
motivasi:"Jangan Takut Ketika Kamu Gagal.",
nasehat:`Kegagalan adalah guru terbaik.
Setiap kegagalan yang kamu alami akan membuatmu jauh lebih kuat. 
Jangan takut untuk melangkah maju hanya karena bayang-bayang kegagalan. 
Sebab setiap langkah baru yang berani kamu ambil, adalah cerita baru yang sedang ditulis oleh kisah hidupmu.
Kegagalan bukanlah akhir dari perjalanan,
melainkan guru yang diam-diam mengajarkanmu tentang apa itu KEKUATAN.
Ingatlah, bahwa bahkan matahari pun pernah tenggelam setiap sore,
namun ia selalu kembali bangkit untuk terbit dengan cahaya yang lebih indah di pagi hari. 
Oleh karena itu bangunlah, dan mulailah, untuk melangkah ke depan. 
Jika engkau jatuh, bangkitlah dengan hati yang lebih kuat.
Karena orang yang berani bangkit lagi,
pada akhirnya akan menemukan jalan terbaik menuju cahaya kesuksesan.
Bayangkan jika ibumu tidak berani dan takut untuk mempertaruhkan nyawanya demi melahirkanmu,
 mungkinkah kamu sedang membaca tulisan ini?😐 `,
gambar:"gambardua.jpg"
},

];

let indexSekarang=0;

function motivasiBaru(){

let random=Math.floor(Math.random()*daftarMotivasi.length);

indexSekarang=random;

document.getElementById("motivasi").innerText=daftarMotivasi[random].motivasi;

document.getElementById("nasehat").style.display="none";

document.body.style.backgroundImage="url("+daftarMotivasi[random].gambar+")";

}

function lihatNasehat(){

document.getElementById("nasehat").style.display="block";

document.getElementById("nasehat").innerText=daftarMotivasi[indexSekarang].nasehat;

}

function shareWA(){

let teks=document.getElementById("motivasi").innerText;

let url="https://wa.me/?text="+encodeURIComponent(teks);

window.open(url);

}

const hariIni=new Date();

document.getElementById("tanggal").innerText=hariIni.toDateString();

motivasiBaru();

</script>

</body>
</html>
